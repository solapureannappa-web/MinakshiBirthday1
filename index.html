<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Minakshi 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap" rel="stylesheet"/>

<style>
body {margin:0;font-family:'Lato';background:#fff8f0;color:#3b1a2e;}
.hero {height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#3b1a2e,#e8416a);color:white;text-align:center;}
.hero h1 span{color:#f7c948;}
.gallery-section{padding:50px;background:#fde8f0;}
.img-wrap img{width:100%;border-radius:10px;}
.footer{text-align:center;padding:40px;background:#3b1a2e;color:white;}
#music-btn{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#e8416a;color:white;font-size:24px;border:none;}
#tap-overlay{position:fixed;inset:0;background:#2a0e1f;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;}
.start-btn{padding:15px 30px;background:#f7c948;border:none;border-radius:30px;font-size:18px;}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bg-audio" loop preload="auto">
  <source src="https://raw.githubusercontent.com/solapureannappa-web/MinakshiBirthday1/main/jaisemerat_NkIxrAeA.mp3" type="audio/mpeg">
</audio>

<!-- MUSIC BUTTON -->
<button id="music-btn">🎵</button>

<!-- OVERLAY -->
<div id="tap-overlay">
  <h2>🎁 A Gift for Minakshi</h2>
  <button class="start-btn" id="startBtn">Open Surprise</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Happy Birthday <br><span>Minakshi</span></h1>
  <p>Today is all about you 💖</p>
</div>

<!-- GALLERY -->
<div class="gallery-section">
  <div class="img-wrap">
    <img src="IMG-20260425-WA0009.jpg">
  </div>
  <div class="img-wrap">
    <img src="IMG-20260425-WA0010.jpg">
  </div>
  <div class="img-wrap">
    <img src="IMG-20260425-WA0011.jpg">
  </div>
</div>

<!-- MESSAGE -->
<div style="padding:40px;text-align:center;">
  <h2>💌 Message</h2>
  <p>Happy Birthday to my best friend 💛</p>
  <p>You make my life beautiful 🌸</p>
</div>

<!-- FOOTER -->
<div class="footer">
  <h2>💖 Happy Birthday 💖</h2>
</div>

<script>
const audio = document.getElementById('bg-audio');
const btn = document.getElementById('music-btn');
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('tap-overlay');

let playing = false;

// START BUTTON CLICK
startBtn.addEventListener('click', () => {

  overlay.style.display = 'none';

  audio.load(); // important
  audio.volume = 0;

  audio.play().then(() => {
    playing = true;
    btn.textContent = '🎵';

    // smooth volume fade
    let vol = 0;
    let fade = setInterval(() => {
      if (vol < 1) {
        vol += 0.05;
        audio.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);

  }).catch(err => {
    console.log(err);
    btn.textContent = '▶️';
  });

});

// TOGGLE MUSIC
btn.addEventListener('click', () => {
  if (playing) {
    audio.pause();
    btn.textContent = '▶️';
    playing = false;
  } else {
    audio.play();
    btn.textContent = '🎵';
    playing = true;
  }
});
</script>

</body>
</html>
